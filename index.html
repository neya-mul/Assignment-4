<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Job Tracker</title>
    <!-- tailwind link -->
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <!-- google fonts link -->
    <link href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&display=swap" rel="stylesheet">
    <!-- font awesome link -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
        integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
        crossorigin="anonymous" referrerpolicy="no-referrer" />
    <style>
        * {
            font-family: "Geist", sans-serif;
            font-optical-sizing: auto;
        }
    </style>


</head>

<body class="max-w-[1200px] mx-auto pt-9 bg-[#f4f9fe]">
    <!-- header section -->

    <header class="space-y-3">
        <h1 class="text-3xl font-bold"> Job Application Tracker</h1>
        <div class="flex justify-between">
            <div class="w-[350px] text-left  px-4 py-3 bg-white border-gray-200">
                <p>Total</p>
                <h1 class="font-bold">0</h1>
            </div>
            <div class="w-[350px] text-left px-4 py-3 bg-white border-gray-200">
                <p>Interview</p>
                <h1 class="text-[#10B981] font-bold ">0</h1>
            </div>
            <div class="w-[350px] text-left  px-4 py-3 bg-white border-gray-200">
                <p>Rejected</p>
                <h1 class="text-[#EF4444] font-bold">0</h1>
            </div>
        </div>
    </header>
    <hr class="my-9 text-gray-200"> 
    <main>
        <!-- section 1 -->
        <section class="section flex justify-between">
            <div>
                <h1 class="mb-5">Available Jobs</h1>
                <button class="bg-blue-500 mr-4 text-white rounded-sm px-6 py-2">All</button>
                <button class="text-black mr-4 bg-white rounded-sm px-6 py-2">Interview</button>
                <button class="text-black mr-4 bg-white rounded-sm px-6 py-2">Rejected</button>
            </div>
            <p><span>0</span>  Jobs</p>
        </section>
    </main>

    <script src="./script.js"></script>
</body>

</html>
