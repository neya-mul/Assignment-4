<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Job Tracker</title>
    <!-- tailwind link -->
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <!-- google fonts link -->
    <link href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&display=swap" rel="stylesheet">

    <style>
        * {
            font-family: "Geist", sans-serif;
            font-optical-sizing: auto;
        }
    </style>


</head>

<body class="max-w-[1200px] mx-auto border pt-9 bg-[#f4f9fe]">

    <header class="space-y-3">
        <h1 class="text-3xl font-bold"> Job Application Tracker</h1>
        <div class="flex justify-between">
            <div class="w-[350px] text-left  px-4 py-3 bg-white border-gray-200">
                <p>Total</p>
                <h1 class="font-bold">0</h1>
            </div>
            <div class="w-[350px] text-left px-4 py-3 bg-white border-gray-200">
                <p>Interview</p>
                <h1 class="text-[#10B981] font-bold ">0</h1>
            </div>
            <div class="w-[350px] text-left  px-4 py-3 bg-white border-gray-200">
                <p>Rejected</p>
                <h1 class="text-[#EF4444] font-bold">0</h1>
            </div>
        </div>
    </header>

<script src="./script.js"></script>
</body>

</html>
